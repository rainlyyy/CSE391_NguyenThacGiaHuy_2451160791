<!DOCTYPE html>
<html>
<head>
    <style>
        /* CSS để kiểm chứng màu sắc */
        h1 { border: 2px solid red; }
        .price { background: yellow; }
        #app header { border-bottom: 5px solid blue; }
        nav a:first-child { color: green; font-weight: bold; }
        .product.featured h2 { color: purple; }
        article > p { font-style: italic; }
        a[href="/"] { text-decoration: underline; }
        .top-bar.dark h1 { background: lightgray; }
    </style>
</head>
<body>
    <div id="app">
        <header class="top-bar dark">
            <h1>ShopTLU</h1>
            <nav>
                <a href="/" class="active">Home</a>
                <a href="/products">Products</a>
                <a href="/about">About</a>
            </nav>
        </header>
        <main>
            <article class="product">
                <h2>iPhone 16</h2>
                <p class="price">25.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
            <article class="product featured">
                <h2>MacBook Pro</h2>
                <p class="price">45.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
        </main>
    </div>
</body>
</html>
