<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid Layout E-Commerce</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="layout-container">
        <header class="header">HEADER</header>
        <section class="hero-banner">
            <div class="hero-card">HERO BANNER (Nổi bật)</div>
        </section>
        
        <aside class="sidebar">
            <h3>Bộ lọc</h3>
            <label><input type="checkbox"> Điện thoại</label><br>
            <label><input type="checkbox"> Laptop</label>
        </aside>

        <main class="main-content">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
            <div class="card">Card 4</div>
            <div class="card">Card 5</div>
            <div class="card">Card 6</div>
        </main>

        <aside class="ads">
            <img src="https://via.placeholder.com/150x600?text=Quảng+cáo" style="max-width: 100%;">
        </aside>

        <footer class="footer">FOOTER</footer>
    </div>
</body>
</html>
