<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia</title>
</head>
<body>

    <svg width="88" height="40">
        <rect width="88" height="40" fill="black"></rect>
        <text x="15" y="25" fill="white" font-family="sans-serif" >Mchose</text>
    </svg>

    <h1>Đồ Gear Yêu Thích</h1>


    <figure>
        <img src="aula_hero_68.jpg" alt="Bàn phím cơ Mchose Ace 68 esports" loading="lazy" width="400" height="400" style="max-width: 100%; height: auto;">
        <figcaption>1. Bàn phím cơ Mchose Ace 68 esports</figcaption>
    </figure>

    <figure>
        <img src="chuot_paw3950.jpg" alt="Chuột gaming Mchose K7 Ultra" loading="lazy" width="400" height="400" style="max-width: 100%; height: auto;">
        <figcaption>2. Chuột gaming Mchose K7 Ultra</figcaption>
    </figure>

    <figure>
        <img src="iem_zero.jpg" alt="Tai nghe Mchose V9 Turbo +" loading="lazy" width="400" height="400" style="max-width: 100%; height: auto;">
        <figcaption>3. Tai nghe Mchose V9 Turbo +</figcaption>
    </figure>

    <h2>Video Review từ YouTube</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen style="max-width: 100%;"></iframe>


    <h2>Video đập hộp thực tế</h2>
    <video controls poster="anh_bia_video.jpg" style="max-width: 100%; height: auto;">
        <source src="video_dap_hop.mp4" type="video/mp4">
        <source src="video_dap_hop.webm" type="video/webm">
    </video>

    <!-- Audio -->
    <h2>Nhạc nền test tai nghe</h2>
    <audio controls>
        <source src="nhac_test_bass.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
