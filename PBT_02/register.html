<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - ShopTLU</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        form { max-width: 600px; margin: auto; }
        fieldset { margin-bottom: 20px; border: 1px solid #ddd; padding: 15px; }
        legend { font-weight: bold; padding: 0 10px; }
        div { margin-bottom: 10px; }
        label { display: block; }
        input[type="text"], input[type="email"], input[type="tel"], 
        input[type="password"], input[type="date"], select, textarea {
            width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;
        }
        .radio-group label { display: inline; margin-right: 15px; }
    </style>
</head>
<body>
    <h1>Đăng ký tài khoản</h1>
    <form action="#" method="POST">
        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <div>
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" required 
                       minlength="2" maxlength="50" placeholder="Nhập họ và tên">
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="vidu@email.com">
            </div>
            <div>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" 
                       placeholder="09XXXXXXXX (10 chữ số)">
            </div>
            <div>
                <label for="dob">Ngày sinh:</label>
                <!-- max="2026-04-30" vì hôm nay là 30/04/2026 -->
                <input type="date" id="dob" name="dob" max="2026-04-30">
            </div>
        </fieldset>

        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
            <legend>Tài khoản</legend>
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" 
                       pattern="[a-zA-Z0-9_]{3,20}" placeholder="Chữ cái, số, gạch dưới (3-20 ký tự)">
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required minlength="8"
                       pattern="(?=.*\d)(?=.*[A-Z]).{8,}" 
                       placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 số">
            </div>
            <div>
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" 
                       required placeholder="Nhập lại mật khẩu">
            </div>
        </fieldset>

        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <div>
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">--Chọn thành phố--</option>
                    <option value="hn">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="dn">Đà Nẵng</option>
                    <option value="hp">Hải Phòng</option>
                    <option value="ct">Cần Thơ</option>
                </select>
            </div>
            <div>
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea>
            </div>
            <div class="radio-group">
                <label>Giới tính:</label><br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Nam</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Nữ</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Khác</label>
            </div>
        </fieldset>

        <div>
            <label>
                <input type="checkbox" name="agree" required> 
                Tôi đồng ý với điều khoản sử dụng
            </label>
        </div>

        <button type="submit">Đăng ký</button>
        <button type="reset">Làm lại</button>
    </form>
</body>
</html>
